  build:
    # needs:
    #   - lint
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [[ubuntu-24.04]]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Complete git history is required to generate the version from git tags.

      - name: Verify snap builds successfully
        id: build
        uses: canonical/action-build@v1

      - name: Determine system architecture
        run: echo "SYSTEM_ARCH=$(uname -m)" >> $GITHUB_ENV

      - name: Upload the built snap
        uses: actions/upload-artifact@v5
        with:
          name: snap_${{ env.SYSTEM_ARCH }}
          path: ${{ steps.build.outputs.snap }}

  func:
    needs:
      - build
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [[self-hosted-linux-amd64-noble-xlarge]]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Complete git history is required to generate the version from git tags.

      - name: Determine system architecture
        run: echo "SYSTEM_ARCH=$(uname -m)" >> $GITHUB_ENV

      - name: Download snap file artifact
        uses: actions/download-artifact@v6
        with:
          name: snap_${{ env.SYSTEM_ARCH }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v6	
        with:
          python-version: "3.10"

      - name: Setup Juju 3.6/stable environment
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          juju-channel: 3.6/stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'tox<5'

      - name: Diagnose PostgreSQL deployment
        run: |
          echo "=== Starting PostgreSQL deployment diagnostic ==="

          juju add-model postgresql-test
          juju deploy ch:postgresql --channel 14/stable --series jammy

          echo "=== Waiting for PostgreSQL deployment ==="
          # Wait for unit to reach a final state
          set +e
          juju wait-for unit postgresql/0 --timeout 10m0s
          WAIT_EXIT_CODE=$?
          set -e

          # Get the current unit status
          sudo apt install -y jq
          UNIT_STATUS=$(juju status postgresql --format=json 2>/dev/null | jq -r '.applications.postgresql.units."postgresql/0"."workload-status".current' || echo "unknown")
          echo "PostgreSQL unit final status: $UNIT_STATUS"

          if [ "$UNIT_STATUS" = "error" ] || [ "$WAIT_EXIT_CODE" -ne 0 ]; then
            echo "=== PostgreSQL deployment FAILED ==="
            echo "--- Full juju status ---"
            juju status --format=json | jq '.'

            # Capture unit details
            echo ""
            echo "--- PostgreSQL details ---"
            juju show-unit postgresql/0

            # Capture debug logs
            echo ""
            echo "--- Logs from PostgreSQL unit ---"
            juju debug-log --replay --no-tail --include postgresql

            echo ""
            echo "--- Logs from PostgreSQL unit machine ---"
            MACHINE_ID=$(juju show-unit postgresql/0 --format json | jq -r '.[].machine')
            juju ssh "$MACHINE_ID" -- cat /var/log/juju/machine-${MACHINE_ID}.log

            echo ""
            echo "=== Diagnostic information capture complete ==="
            echo "ERROR: PostgreSQL deployment failed in diagnostic test"
          else
            echo "=== PostgreSQL deployment succeeded in diagnostic test ==="
          fi

          echo "=== Diagnostic step complete ==="
        continue-on-error: false

      - name: Run func tests
        run: |
          export TEST_SNAP="$(pwd)/$(ls | grep '.*_.*\.snap$')"
          echo "$TEST_SNAP"
          tox -e func

      - name: Create artifact name suffix
        run: |
          BASE_VERSION_SANITIZED=${{ matrix.runs-on }}
          BASE_VERSION_SANITIZED=${BASE_VERSION_SANITIZED//./-}
          echo "ARTIFACT_SUFFIX=$BASE_VERSION_SANITIZED-${{ env.SYSTEM_ARCH }}" >> $GITHUB_ENV

      - name: Rename Functional Test Coverage Artifact
        run: |
          if [ -e ".coverage-func" ]; then
            mv .coverage-func .coverage-func-${{ env.ARTIFACT_SUFFIX }}
          else
            echo "No coverage file found, skipping rename"
          fi

      - name: Upload Functional Test Coverage Artifact
        uses: actions/upload-artifact@v5
        with:
          include-hidden-files: true
          if-no-files-found: ignore
          name: coverage-functional-${{ env.ARTIFACT_SUFFIX }}
          path: .coverage-func-${{ env.ARTIFACT_SUFFIX }}

  tics-analysis:
    runs-on: [self-hosted, linux, amd64, tiobe, jammy]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: func
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install coverage tools
        run: |
          pip install coverage[toml]

      # Install everything from all requirements.txt files otherwise TICS errors.
      - name: Install all snap dependencies
        env:
          # to ensure that zaza installs correctly
          TEST_JUJU3: "1"
        run: |
          for f in $(find -name '*requirements.txt'); do
              echo "${f}"
              pip3 install --requirement "${f}"
          done

      - name: Determine system architecture
        run: echo "SYSTEM_ARCH=$(uname -m)" >> $GITHUB_ENV

      - name: Download Coverage Files
        uses: actions/download-artifact@v6
        with:
          pattern: coverage-*-${{ env.SYSTEM_ARCH }}
          merge-multiple: true
          path: artifacts/
        continue-on-error: true

      - name: Merge coverage reports
        run: |
          # Create the path that is expected to have a coverage.xml for tics
          mkdir -p tests/report/

          coverage_files=(./artifacts/.coverage*)

          if [ -e "${coverage_files[0]}" ]; then
            echo "Merging coverage files: ${coverage_files[*]}"
            coverage combine "${coverage_files[@]}"

            # Check if there is actual data to report before generating XML with merged reports
            if coverage report > /dev/null 2>&1; then
              coverage report --show-missing
              coverage xml -o tests/report/coverage.xml
            fi

          fi

      - name: Run TICS analysis
        uses: tiobe/tics-github-action@v3
        with:
          mode: qserver
          project: juju-backup-all
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          branchdir: ${{ github.workspace }}
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true
